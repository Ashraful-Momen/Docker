# docker-stack.yml - For Docker Swarm deployment
version: '3.8'

services:
  # Laravel App with Replicas
  app:
    image: instasure-dockerized_app  # Use your built image
    deploy:
      replicas: 2  # Run 2 instances for high availability
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      placement:
        constraints:
          - node.role == worker
    volumes:
      - app_data:/var/www/html
    networks:
      - laravel_network
    depends_on:
      - mysql
      - redis

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      placement:
        constraints:
          - node.role == manager
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - app_data:/var/www/html
    networks:
      - laravel_network
    depends_on:
      - app

  # MySQL with Persistent Storage
  mysql:
    image: mysql:8.0
    deploy:
      replicas: 1  # Database should only have 1 replica
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      placement:
        constraints:
          - node.role == manager  # Run on manager node for stability
    environment:
      MYSQL_DATABASE: laravel_db
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: laravel_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - laravel_network
    command: >
      --max_allowed_packet=1024M
      --net_read_timeout=600
      --net_write_timeout=600
      --wait_timeout=28800
      --interactive_timeout=28800

  # Redis with High Availability
  redis:
    image: redis:7-alpine
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - laravel_network

  # PHPMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root_password
      UPLOAD_LIMIT: 2048M
    ports:
      - "8081:80"
    networks:
      - laravel_network
    depends_on:
      - mysql

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  app_data:
    driver: local

networks:
  laravel_network:
    driver: overlay
    attachable: true

# Deployment commands:
# 1. Initialize swarm: docker swarm init
# 2. Deploy stack: docker stack deploy -c docker-stack.yml laravel
# 3. View services: docker service ls
# 4. Scale services: docker service scale laravel_app=3
# 5. Update service: docker service update laravel_app
