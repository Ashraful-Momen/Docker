; PHP Configuration for Laravel Production
; File: ./docker/php/local.ini

; Basic PHP Settings
max_execution_time = 300
max_input_time = 300
memory_limit = 512M

; File Upload Settings
upload_max_filesize = 100M
post_max_size = 100M
max_file_uploads = 20

; Session Settings
session.gc_maxlifetime = 3600
session.cookie_lifetime = 0

; Error Handling (adjust for production)
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/log/php_errors.log

; OPcache Settings for Performance
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 2
opcache.fast_shutdown = 1

; Realpath Cache (improves performance)
realpath_cache_size = 32M
realpath_cache_ttl = 600

; Additional Laravel optimizations
default_socket_timeout = 60
auto_detect_line_endings = Off

; Security
expose_php = Off
allow_url_fopen = On
allow_url_include = Off

; Date/Time
date.timezone = "UTC"
