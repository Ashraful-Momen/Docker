version: '3.8'

services:
  # Composer Init Container
  composer:
    image: composer:2
    volumes:
      - /home/ashraful/Laravel_version_test/LaravelPHP83Docker/instasure-dockerized:/app
    working_dir: /app
    command: install --no-dev --optimize-autoloader
    deploy:
      restart_policy:
        condition: none

  # Node.js for Frontend Assets
  node:
    image: node:18-alpine
    volumes:
      - /home/ashraful/Laravel_version_test/LaravelPHP83Docker/instasure-dockerized:/var/www/html
    working_dir: /var/www/html
    command: sh -c "npm install && npm run dev"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      placement:
        constraints:
          - node.role == manager
    networks:
      - laravel_network

  # Laravel App with Replicas
  app:
    image: instasure-dockerized_app:latest
    deploy:
      replicas: 12
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      placement:
        constraints:
          - node.role == manager
    volumes:
      - /home/ashraful/Laravel_version_test/LaravelPHP83Docker/instasure-dockerized:/var/www/html
      # Mount PHP configuration
      - /home/ashraful/Laravel_version_test/LaravelPHP83Docker/instasure-dockerized/docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - laravel_network
    depends_on:
      - mysql
      - redis
      - composer

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    deploy:
      replicas: 4
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      placement:
        constraints:
          - node.role == manager
    volumes:
      - /home/ashraful/Laravel_version_test/LaravelPHP83Docker/instasure-dockerized/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /home/ashraful/Laravel_version_test/LaravelPHP83Docker/instasure-dockerized/public:/var/www/html/public:ro
    networks:
      - laravel_network
    depends_on:
      - app

  # MySQL Database with Custom Configuration
  mysql:
    image: mysql:8.0
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      placement:
        constraints:
          - node.role == manager
    environment:
      MYSQL_DATABASE: laravel_db
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: laravel_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Mount custom MySQL configuration
      - /home/ashraful/Laravel_version_test/LaravelPHP83Docker/instasure-dockerized/docker/mysql/my.cnf:/etc/mysql/my.cnf
    networks:
      - laravel_network
    # Remove command override as settings are now in my.cnf

  # Redis with High Availability
  redis:
    image: redis:7-alpine
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - laravel_network

  # PHPMyAdmin with Custom Upload Configuration
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root_password
      # Remove UPLOAD_LIMIT as it's now configured via upload.ini
    ports:
      - "8081:80"
    volumes:
      # Mount custom PHPMyAdmin upload configuration
      - /home/ashraful/Laravel_version_test/LaravelPHP83Docker/instasure-dockerized/docker/phpmyadmin/upload.ini:/usr/local/etc/php/conf.d/uploads.ini
    networks:
      - laravel_network
    depends_on:
      - mysql

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  laravel_network:
    driver: overlay
    attachable: true
