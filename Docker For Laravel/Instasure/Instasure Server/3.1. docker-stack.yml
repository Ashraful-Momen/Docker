version: '3.8'

services:
  # Laravel App - exact mirror of docker-compose
  app:
    image: instasure-dockerized_app:latest
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    working_dir: /var/www/html
    volumes:
      - /home/ashraful/gitlab_project/instasure-dockerized:/var/www/html
      - /home/ashraful/gitlab_project/instasure-dockerized/docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - laravel_network
    depends_on:
      - mysql
      - redis

  # Nginx - exact mirror of docker-compose
  nginx:
    image: nginx:alpine
    deploy:
      replicas: 1
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /home/ashraful/gitlab_project/instasure-dockerized:/var/www/html
      - /home/ashraful/gitlab_project/instasure-dockerized/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel_network
    depends_on:
      - app

  # MySQL - exact mirror of docker-compose
  mysql:
    image: mysql:8.0
    deploy:
      replicas: 1
    environment:
      MYSQL_DATABASE: laravel_db
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: laravel_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - /home/ashraful/gitlab_project/instasure-dockerized/docker/mysql/my.cnf:/etc/mysql/my.cnf
    networks:
      - laravel_network

  # Redis - exact mirror of docker-compose
  redis:
    image: redis:7-alpine
    deploy:
      replicas: 1
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - laravel_network

  # Node.js - exact mirror of docker-compose
  node:
    image: node:18-alpine
    deploy:
      replicas: 1
      restart_policy:
        condition: none
    working_dir: /var/www/html
    volumes:
      - /home/ashraful/gitlab_project/instasure-dockerized:/var/www/html
    networks:
      - laravel_network
    command: sh -c "npm install && npm run dev"

  # PHPMyAdmin - exact mirror of docker-compose
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    deploy:
      replicas: 1
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root_password
    ports:
      - "8081:80"
    volumes:
      - /home/ashraful/gitlab_project/instasure-dockerized/docker/phpmyadmin/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
    networks:
      - laravel_network
    depends_on:
      - mysql

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  laravel_network:
    driver: overlay
    attachable: true
