version: '3.8'

services:
  # Laravel App - using built image instead of building
  app:
    image: ashrafulinstasure/instasure:v1.0.1  # Use your built image
    container_name: laravel_app_test
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    networks:
      - laravel_network
    depends_on:
      - mysql
      - redis

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: laravel_nginx_test
    restart: unless-stopped
    ports:
      - "8090:80"  # Different port to avoid conflicts
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel_network
    depends_on:
      - app

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: laravel_mysql_test
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel_db
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: laravel_password
    ports:
      - "3308:3306"  # Different port
    networks:
      - laravel_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: laravel_redis_test
    restart: unless-stopped
    ports:
      - "6381:6379"  # Different port
    networks:
      - laravel_network

networks:
  laravel_network:
    driver: bridge
