| Service | Internal Port | External Port | Purpose |
|---------|---------------|---------------|---------|
| **Nginx** | 80/443 | 80/443 | Web traffic |
| **MySQL** | 3306 | 3307 | Database access |
| **Redis** | 6379 | 6380 | Cache access |
| **PHPMyAdmin** | 80 | 8081 | DB management |

